spring:
  application:
    name: cycling-api
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:cycling_api}?sslmode=require
    username: ${PGUSER:antonge}
    password: ${PGPASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 10
      min-spare: 2

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 #${JWT_SECRET}
  expiration-ms: 86400000

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui